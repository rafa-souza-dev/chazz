version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: chazz-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/generated
    environment:
      - NODE_ENV=development
      - PORT=3000
    env_file:
      - .env
    restart: unless-stopped
